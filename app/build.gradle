if (Shizuku.pingBinder()) {
    if (Shizuku.checkSelfPermission() == PackageManager.PERMISSION_GRANTED) {
        Toast.makeText(this, "Shizuku Conectado! Controle liberado.", Toast.LENGTH_SHORT).show()
        // Aqui o app já sabe que tem permissão. A luz verde acende!
    } else {
        Shizuku.requestPermission(0)
    }
} else {
    Toast.makeText(this, "O serviço do Shizuku não está rodando.", Toast.LENGTH_SHORT).show()
}
